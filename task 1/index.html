<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="task-controls">
            <select id="filterStatus">
                <option value="all">Всі статуси</option>
                <option value="new">Нове</option>
                <option value="inProgress">В процесі</option>
                <option value="completed">Завершено</option>
            </select>

            <select id="sortPriority">
                <option value="none">Без сортування</option>
                <option value="highToLow">Пріоритет: спочатку високий</option>
                <option value="lowToHigh">Пріоритет: спочатку низький</option>
            </select>
        </div>
        <form action="" class="task-form">
            <input type="text" placeholder="Введіть опис завдання" name="description">
            <select name="priority" id="priority">
                <option value="high">високий</option>
                <option value="medium">середній</option>
                <option value="low">низький</option>
            </select>
            <select name="status" id="status">
                <option value="new">нове</option>
                <option value="inProgresss">в процесі</option>
                <option value="completed">завершено</option>
            </select>
            <button type="submit">Додати завдання</button>
        </form>
        <ul class="task-list">
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
